apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-explorer
  namespace: llm-explorer
spec:
  hostnames:
    - llm-explorer.romaine.life
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: envoy-gateway-system
    - group: gateway.networking.x-k8s.io
      kind: XListenerSet
      name: llm-explorer
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: llm-explorer
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
